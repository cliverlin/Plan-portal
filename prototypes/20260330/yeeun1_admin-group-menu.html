  {name:'일본 지사 패턴',isDefault:false,owner:'other',ownerName:'김지사(부서관리자)',customCount:5,modDate:'2026.02.05',policyCount:0,policies:[]},

const basicPatterns=[

// ═══ CARDS ═══
function renderCards(){
  const q=(document.getElementById('groupSearch')?.value||'').toLowerCase();
  const f=groups.map((g,i)=>({...g,_i:i})).filter(g=>g.name.toLowerCase().includes(q));
  document.getElementById('groupCount').textContent=`총 ${f.length}개`;

  document.getElementById('cardList').innerHTML=f.map(g=>{
    const i=g._i, ro=isRO(g);
    let icons='';
    if(g.isDefault) icons+=`<span class=&quot;badge-default&quot;>대표</span>`;
    if(ro) icons+=`<span class=&quot;lock-badge&quot;>🔒 읽기 전용</span>`;

    let fc='flag-icon';
    if(g.isDefault)fc+=' active';
    if(role==='dept')fc+=' no-interact';
    let fclick='';
    if(role==='admin'&amp;&amp;!g.isDefault) fclick=`onclick=&quot;event.stopPropagation();trySetDefault(${i})&quot;`;

    let meta=[`관리자 정의 패턴 ${g.customCount}개`];
    if(ro)meta.push(`생성자: ${g.ownerName}`);
    meta.push(`수정 일시 ${g.modDate}`);

    let ph=g.policyCount>0
      ?`<div class=&quot;policy-count&quot;>${g.policyCount}개 정책 적용 중<div class=&quot;tooltip&quot;>${g.policies.join('<br>')}</div></div>`
      :`<div class=&quot;policy-count&quot; style=&quot;color:#bbb;&quot;>0개 정책 적용 중</div>`;

    let dd=`<button class=&quot;dropdown-item&quot; onclick=&quot;event.stopPropagation();copyGroup(${i})&quot;>복사하기</button>`;
    const canDel=(role==='admin')||(role==='dept'&amp;&amp;g.owner==='me');
    if(canDel&amp;&amp;!g.isDefault) dd+=`<button class=&quot;dropdown-item danger&quot; onclick=&quot;event.stopPropagation();tryDelete(${i})&quot;>삭제하기</button>`;

    return `<div class=&quot;group-card${ro?' readonly':''}&quot; onclick=&quot;goDetail(${i})&quot;>
      <div class=&quot;card-left&quot;>
        <span class=&quot;${fc}&quot; ${fclick} title=&quot;${g.isDefault?'대표 그룹':(role==='admin'?'대표 그룹으로 설정':'')}&quot;>🚩</span>
        <div class=&quot;card-info&quot;>
          <div class=&quot;card-name-row&quot;><span class=&quot;card-name&quot;>${g.name}</span>${icons}</div>
          <div class=&quot;card-meta&quot;>${meta.map(m=>`<span>${m}</span>`).join('<span class=&quot;dot&quot;>·</span>')}</div>
        </div>
      </div>
      <div class=&quot;card-right&quot;>${ph}<button class=&quot;more-btn&quot; onclick=&quot;event.stopPropagation();toggleDD('dd-${i}')&quot;>⋯</button><div class=&quot;dropdown&quot; id=&quot;dd-${i}&quot;>${dd}</div></div>
    </div>`;
  }).join('');
}

// ═══ DETAIL ═══
function goToList(){document.getElementById('page-list').classList.add('active');document.getElementById('page-detail').classList.remove('active');document.getElementById('breadcrumb-current').textContent='민감정보 패턴 관리 그룹';renderCards();}

function goDetail(idx){
  curGroup=idx;const g=groups[idx];const ro=isRO(g);
  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('breadcrumb-current').textContent=g.name;
  document.getElementById('detailGroupName').value=g.name;
  document.getElementById('detailGroupName').readOnly=ro;
  document.getElementById('detailDefaultBadge').style.display=g.isDefault?'':'none';
  document.getElementById('detailLockBadge').style.display=ro?'':'none';
  document.getElementById('readonlyBanner').style.display=ro?'flex':'none';
  document.getElementById('basicBlockOverlay').classList.toggle('show',ro);
  document.getElementById('customBlockOverlay').classList.toggle('show',ro);
  switchTab('basic');renderBasic();renderCustom();
}

function switchTab(t){document.querySelectorAll('.tab-item').forEach((e,i)=>e.classList.toggle('active',(t==='basic'&amp;&amp;i===0)||(t==='custom'&amp;&amp;i===1)));document.getElementById('tab-basic').style.display=t==='basic'?'':'none';document.getElementById('tab-custom').style.display=t==='custom'?'':'none';}

function renderBasic(){
  document.getElementById('basicBody').innerHTML=basicPatterns.map(p=>`<tr><td><span class=&quot;link&quot; onclick=&quot;openBasic('${p.name}')&quot;>${p.name}</span></td><td>${p.min}개</td><td>${p.opts.length?p.opts.map(o=>`<span class=&quot;detection-tag&quot;>${o}</span>`).join(''):'<span style=&quot;color:#ccc;&quot;>—</span>'}</td><td><button class=&quot;btn btn-secondary btn-sm&quot; onclick=&quot;openBasic('${p.name}')&quot;>설정</button></td></tr>`).join('');
}

function renderCustom(){
  const gp=customPatterns.filter(p=>p.gid===curGroup);
  document.getElementById('customEmpty').style.display=gp.length===0?'block':'none';
  document.getElementById('customTable').style.display=gp.length===0?'none':'';
  document.getElementById('customBody').innerHTML=gp.map(p=>`<tr><td><input type=&quot;checkbox&quot; class=&quot;cc&quot; value=&quot;${p.id}&quot; onchange=&quot;updateCC()&quot;></td><td>${p.type}</td><td><span class=&quot;link&quot; onclick=&quot;openCustomEdit(${p.id})&quot;>${p.name}</span></td><td>${p.min}개</td><td style=&quot;font-family:'SF Mono','Consolas',monospace;font-size:11.5px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;&quot;>${p.content}</td><td>${p.ex>0?`<span class=&quot;detection-tag&quot;>제외 패턴 ${p.ex}</span>`:'<span style=&quot;color:#ccc;&quot;>—</span>'}</td><td><button class=&quot;btn btn-secondary btn-sm&quot; onclick=&quot;openCustomEdit(${p.id})&quot;>설정</button></td></tr>`).join('');
}

// ═══ GROUP CRUD ═══
function validateCreate(){const n=document.getElementById('newGroupName').value.trim();const dup=groups.some(g=>g.name===n);document.getElementById('createError').style.display=dup?'block':'none';document.getElementById('btnCreate').disabled=!n||dup;}
function createGroup(){const n=document.getElementById('newGroupName').value.trim();groups.push({name:n,isDefault:false,owner:'me',ownerName:role==='dept'?'나(부서관리자)':'나(전체관리자)',customCount:0,modDate:'2026.03.20',policyCount:0,policies:[]});closeModal('createGroupModal');document.getElementById('newGroupName').value='';renderCards();showToast(`'${n}' 관리 그룹을 생성하였습니다.`);}
function copyGroup(i){closeAllDD();const s=groups[i];let cn=s.name+' (복사본)';if(cn.length>30)cn=cn.substring(0,27)+'...';groups.push({name:cn,isDefault:false,owner:'me',ownerName:role==='dept'?'나(부서관리자)':'나(전체관리자)',customCount:s.customCount,modDate:'2026.03.20',policyCount:0,policies:[]});renderCards();showToast(`'${cn}' 관리 그룹을 생성하였습니다.`);}
function tryDelete(i){closeAllDD();const g=groups[i];if(g.isDefault){document.getElementById('alertTitle').textContent='삭제 불가';document.getElementById('alertMsg').textContent='대표 관리 그룹을 해제 후 삭제해주세요.';openModal('alertModal');return;}if(groups.length<=1){document.getElementById('alertTitle').textContent='삭제 불가';document.getElementById('alertMsg').textContent='최소 1개 이상의 그룹이 필요합니다.';openModal('alertModal');return;}pendingDel=i;let info=`<div class=&quot;label&quot;>선택 그룹</div><div style=&quot;font-size:13px;font-weight:600;margin-bottom:8px;&quot;>${g.name} / 관리자 정의 패턴 ${g.customCount}개</div>`;if(g.policyCount>0)info+=`<div class=&quot;label&quot;>적용된 정책 (${g.policyCount})</div><div class=&quot;policy-list&quot;>${g.policies.map(p=>`<div class=&quot;policy-item&quot;><span class=&quot;policy-dot&quot; style=&quot;background:#4a7cff;&quot;></span>${p}</div>`).join('')}</div>`;document.getElementById('deleteGroupInfo').innerHTML=info;openModal('deleteGroupModal');}
function confirmDeleteGroup(){const n=groups[pendingDel].name;groups.splice(pendingDel,1);closeModal('deleteGroupModal');renderCards();showToast(`'${n}' 관리 그룹을 삭제하였습니다.`);}
function trySetDefault(i){pendingDefault=i;document.getElementById('confirmDefaultText').textContent=`대표 그룹을 '${groups[i].name}'(으)로 변경하시겠습니까?`;openModal('confirmDefaultModal');}
function confirmSetDefault(){groups.forEach(g=>g.isDefault=false);groups[pendingDefault].isDefault=true;closeModal('confirmDefaultModal');renderCards();showToast(`대표 그룹을 '${groups[pendingDefault].name}'(으)로 변경하였습니다.`);}
function saveGroupName(){const g=groups[curGroup];const n=document.getElementById('detailGroupName').value.trim();if(n&amp;&amp;n!==g.name){g.name=n;showToast('그룹명이 변경되었습니다.');}}

// ═══ BASIC PATTERN ═══
function openBasic(name){document.getElementById('basicModalTitle').textContent=name+' 상세 설정';const p=basicPatterns.find(b=>b.name===name);const area=document.getElementById('basicOptionArea');area.innerHTML=p&amp;&amp;p.adv?`<div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>주민등록번호 옵션</div></div><div class=&quot;form-group&quot;><div class=&quot;form-label&quot; style=&quot;font-size:12px;&quot;>검출 강도</div><div class=&quot;radio-group&quot;><div class=&quot;radio-item active&quot;>1단계</div><div class=&quot;radio-item&quot;>2단계</div></div><div class=&quot;form-help&quot; style=&quot;margin-top:6px;&quot;>1단계: 글자 사이에 공백, 엔터가 없는 주민번호만 검출합니다.</div></div><div class=&quot;form-group&quot;><div class=&quot;form-label&quot; style=&quot;font-size:12px;&quot;>구분자 강도</div><div class=&quot;radio-group&quot;><div class=&quot;radio-item active&quot;>1단계</div><div class=&quot;radio-item&quot;>2단계</div><div class=&quot;radio-item&quot;>3단계</div></div></div><div class=&quot;form-group&quot;><div class=&quot;form-label&quot; style=&quot;font-size:12px;&quot;>비식별 패턴 검출</div><div class=&quot;radio-group&quot;><div class=&quot;radio-item active&quot;>OFF</div><div class=&quot;radio-item&quot;>ON</div></div></div>`:'';openModal('basicModal');}

// ═══ CUSTOM PATTERN ═══
function updateCC(){document.getElementById('customSelectCount').textContent=document.querySelectorAll('.cc:checked').length+'개 선택';}
function toggleAllCustom(el){document.querySelectorAll('.cc').forEach(c=>c.checked=el.checked);updateCC();}
function openCustomAdd(){document.getElementById('customModalTitle').textContent='관리자 정의 패턴 등록';document.getElementById('cName').value='';document.getElementById('cContent').value='';document.getElementById('cMinCount').value=1;document.getElementById('btnSaveCustom').textContent='추가하기';document.getElementById('btnSaveCustom').dataset.mode='add';openModal('customModal');}
function openCustomEdit(id){const p=customPatterns.find(x=>x.id===id);document.getElementById('customModalTitle').textContent='관리자 정의 패턴 수정';document.getElementById('cName').value=p.name;document.getElementById('cContent').value=p.content;document.getElementById('cMinCount').value=p.min;document.getElementById('btnSaveCustom').textContent='적용하기';document.getElementById('btnSaveCustom').dataset.mode='edit';openModal('customModal');}
function saveCustom(){const n=document.getElementById('cName').value.trim(),c=document.getElementById('cContent').value.trim();if(!n||!c){showToast('필수 항목을 입력해주세요.');return;}const isAdd=document.getElementById('btnSaveCustom').dataset.mode==='add';if(isAdd){customPatterns.push({id:Date.now(),gid:curGroup,type:'키워드',name:n,min:parseInt(document.getElementById('cMinCount').value),content:c,ex:0});groups[curGroup].customCount=customPatterns.filter(p=>p.gid===curGroup).length;}closeModal('customModal');renderCustom();showToast(isAdd?`'${n}' 관리자 패턴을 추가하였습니다.`:`'${n}' 관리자 패턴이 수정되었습니다.`);}
function deleteSelectedCustom(){const ch=document.querySelectorAll('.cc:checked');if(!ch.length){showToast('삭제할 항목을 선택해주세요.');return;}if(!confirm(`선택한 ${ch.length}개 패턴을 삭제하시겠습니까?`))return;ch.forEach(c=>{const idx=customPatterns.findIndex(p=>p.id===parseInt(c.value));if(idx>-1)customPatterns.splice(idx,1);});groups[curGroup].customCount=customPatterns.filter(p=>p.gid===curGroup).length;renderCustom();showToast(ch.length+'개 패턴이 삭제되었습니다.');}

function switchPType(el,t){el.parentElement.querySelectorAll('.radio-item').forEach(r=>r.classList.remove('active'));el.classList.add('active');document.getElementById('regexTest').classList.toggle('show',t==='re');}
function testRegex(){const p=document.getElementById('cContent').value,t=document.getElementById('regexInput').value,el=document.getElementById('regexResult');try{if(new RegExp(p).test(t)){el.textContent='O 정규식과 일치합니다.';el.className='test-result match';}else{el.textContent='X 정규식과 일치하지 않습니다.';el.className='test-result no-match';}}catch(e){el.textContent='X 올바른 정규식이 아닙니다.';el.className='test-result no-match';}}

// ═══ EXCLUDE ═══
function switchExType(el,t){exType=t;el.parentElement.querySelectorAll('.radio-item').forEach(r=>r.classList.remove('active'));el.classList.add('active');document.getElementById('exRegexTest').classList.toggle('show',t==='re');}
function testExRegex(){const p=document.getElementById('exContent').value,t=document.getElementById('exRegexInput').value,el=document.getElementById('exRegexResult');try{if(new RegExp(p).test(t)){el.textContent='O 정규식과 일치합니다.';el.className='test-result match';}else{el.textContent='X 정규식과 일치하지 않습니다.';el.className='test-result no-match';}}catch(e){el.textContent='X 올바른 정규식이 아닙니다.';el.className='test-result no-match';}}
function addExclude(){const c=document.getElementById('exContent').value.trim();if(!c)return;const list=document.getElementById('customExcludeList');const item=document.createElement('div');item.className='exclude-item';item.innerHTML=`<span class=&quot;ex-type&quot;>${exType==='re'?'정규식':'키워드'}</span><span class=&quot;ex-content&quot;>${c}</span><span class=&quot;ex-del&quot; onclick=&quot;this.parentElement.remove()&quot;>×</span>`;list.appendChild(item);document.getElementById('cExEmpty').style.display='none';closeModal('excludeModal');document.getElementById('exContent').value='';list.scrollTop=list.scrollHeight;}

// ═══ UTIL ═══
function toggleDD(id){closeAllDD();document.getElementById(id).classList.toggle('show');}
function closeAllDD(){document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('show'));}
document.addEventListener('click',closeAllDD);
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function spinVal(id,d){const el=document.getElementById(id);el.value=Math.max(1,Math.min(100,parseInt(el.value||1)+d));}

renderCards();
</script>

</div>

<!-- 그룹 삭제 확인 (정책 적용 중) -->
<div class=&quot;modal-overlay&quot; id=&quot;deleteGroupModal&quot;>
  <div class=&quot;modal&quot; style=&quot;width:420px;&quot;>
    <div class=&quot;modal-body&quot; style=&quot;padding:24px;&quot;>
      <h4 style=&quot;font-size:15px;font-weight:700;margin-bottom:10px;&quot;>이 파일첨부 확장자 그룹을 삭제하시겠습니까?</h4>
      <p style=&quot;font-size:13px;color:#666;line-height:1.6;&quot;>삭제 시 적용 중인 정책에서 '대표 그룹'으로 자동 변경됩니다.</p>
      <div class=&quot;delete-confirm-info&quot; id=&quot;deleteGroupInfo&quot;></div>

      <button class=&quot;btn btn-secondary&quot; onclick=&quot;closeModal('deleteGroupModal')&quot;>취소</button>
      <button class=&quot;btn btn-primary&quot; onclick=&quot;confirmDeleteGroup()&quot;>삭제하기</button>

</div>

<!-- 삭제 불가 Alert -->
<div class=&quot;modal-overlay&quot; id=&quot;alertModal&quot;>

    <p id=&quot;alertMsg&quot;></p>

<!-- 대표 변경 확인 -->
<div class=&quot;modal-overlay&quot; id=&quot;confirmDefaultModal&quot;>
  <div class=&quot;modal&quot; style=&quot;width:420px;&quot;>
    <div class=&quot;modal-body&quot; style=&quot;padding:24px;&quot;>
      <h4 style=&quot;font-size:15px;font-weight:700;margin-bottom:10px;&quot; id=&quot;confirmDefaultText&quot;></h4>
      <p style=&quot;font-size:13px;color:#666;line-height:1.6;&quot;>그룹이 지정되지 않은 정책 세트에 자동 적용됩니다.</p>
    </div>
    <div class=&quot;modal-footer&quot;>
      <button class=&quot;btn btn-secondary&quot; onclick=&quot;closeModal('confirmDefaultModal')&quot;>취소</button>
      <button class=&quot;btn btn-primary&quot; onclick=&quot;confirmSetDefault()&quot;>확인</button>
    </div>
  </div>
</div>

<div class=&quot;toast&quot; id=&quot;toast&quot;></div>

<script>
// ─── State ───
let currentRole = 'admin'; // 'admin' | 'dept'
let currentGroupIdx = null;
let pendingDefaultIdx = null;
let pendingDeleteIdx = null;

const DEFAULT_EXTS = ['7z','alz','bz','bz2','cell','chm','doc','docx','dwg','egg','eml','gz','hml','html','hwd','hwn','hwp','hwpx','hwt','img','iso','jar','jpg','jpeg','json','key','lzh','mdb','mht','numbers','ods','odt','pages','pdf','pem','png','pot','pps','ppsx','ppt','pptx','psd','rar','rtf','show','svg','tar','tgz','tif','tiff','txt','war','xls','xlsb','xlsm','xlsx','xml','xps','zip','123','ai','cab','dqy','gul','hcl','iqy','jnt','mpp','oqy','rqy','sldx','vsd','wps'];

let groups = [
  { name: '기본 제어 확장자', isDefault: true, owner: 'me', ownerName: '나(전체관리자)', sizeLimit: '100KB', exts: [...DEFAULT_EXTS].sort(), policyCount: 9, modDate: '2026.03.15', policies: ['전사 공통 정책','개발팀 정책','디자인팀 정책','마케팅팀 정책','인사팀 정책','외 4개'] },
  { name: '개발팀 확장자', isDefault: false, owner: 'me', ownerName: '나(전체관리자)', sizeLimit: '1MB', exts: DEFAULT_EXTS.slice(0,45).sort(), policyCount: 2, modDate: '2026.03.10', policies: ['개발1팀 정책','개발2팀 정책'] },
  { name: '마케팅팀 확장자', isDefault: false, owner: 'other', ownerName: '김마케팅(부서관리자)', sizeLimit: '10MB', exts: DEFAULT_EXTS.slice(0,30).sort(), policyCount: 0, modDate: '2026.03.08', policies: [] },
];

// ─── Role Switch ───
function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (document.getElementById('page-detail').classList.contains('active')) {
    goDetail(currentGroupIdx);
  } else {
    renderCards();
  }
}

// ─── List ───
function renderCards() {
  const q = (document.getElementById('groupSearch')?.value || '').toLowerCase();
  const filtered = groups.map((g, i) => ({ ...g, _idx: i })).filter(g => g.name.toLowerCase().includes(q));
  document.getElementById('groupCount').textContent = `총 ${filtered.length}개`;

  document.getElementById('cardList').innerHTML = filtered.map(g => {
    const i = g._idx;
    const isReadonly = currentRole === 'dept' &amp;&amp; g.owner === 'other';
    const isDeptOwn = currentRole === 'dept' &amp;&amp; g.owner === 'me';

    let nameIcons = '';
    if (g.isDefault) nameIcons += `<span class=&quot;badge-default&quot;>대표</span>`;
    if (isReadonly) nameIcons += `<span class=&quot;lock-badge&quot;>🔒 읽기 전용</span>`;

    let flagClass = 'flag-icon';
    if (g.isDefault) flagClass += ' active';
    if (currentRole === 'dept') flagClass += ' no-interact';
    let flagClick = '';
    if (currentRole === 'admin' &amp;&amp; !g.isDefault) flagClick = `onclick=&quot;event.stopPropagation(); trySetDefault(${i})&quot;`;
    else if (currentRole === 'admin' &amp;&amp; g.isDefault) flagClick = '';

    let meta = [`제어 확장자 ${g.exts.length}개`, `미제어 차단 ${g.sizeLimit}`];
    if (isReadonly) meta.push(`생성자: ${g.ownerName}`);
    meta.push(`수정 일시 ${g.modDate}`);

    let policyHtml = g.policyCount > 0
      ? `<div class=&quot;policy-count&quot;>${g.policyCount}개 정책 적용 중<div class=&quot;tooltip&quot;>${g.policies.join('<br>')}</div></div>`
      : `<div class=&quot;policy-count&quot; style=&quot;color:#bbb;&quot;>0개 정책 적용 중</div>`;

    // 더보기 메뉴
    let ddItems = `<button class=&quot;dropdown-item&quot; onclick=&quot;event.stopPropagation(); copyGroup(${i})&quot;>복사하기</button>`;
    const canDelete = (currentRole === 'admin') || (currentRole === 'dept' &amp;&amp; g.owner === 'me');
    if (canDelete &amp;&amp; !g.isDefault) {
      ddItems += `<button class=&quot;dropdown-item danger&quot; onclick=&quot;event.stopPropagation(); tryDeleteGroup(${i})&quot;>삭제하기</button>`;
    }

    return `
    <div class=&quot;group-card${isReadonly ? ' readonly' : ''}&quot; onclick=&quot;goDetail(${i})&quot;>
      <div class=&quot;card-left&quot;>
        <span class=&quot;${flagClass}&quot; ${flagClick} title=&quot;${g.isDefault ? '대표 그룹' : (currentRole==='admin' ? '대표 그룹으로 설정' : '')}&quot;>🚩</span>
        <div class=&quot;card-info&quot;>
          <div class=&quot;card-name-row&quot;>
            <span class=&quot;card-name&quot;>${g.name}</span>
            ${nameIcons}
          </div>
          <div class=&quot;card-meta&quot;>${meta.map(m => `<span>${m}</span>`).join('<span class=&quot;dot&quot;>·</span>')}</div>
        </div>
      </div>
      <div class=&quot;card-right&quot;>
        ${policyHtml}
        <button class=&quot;more-btn&quot; onclick=&quot;event.stopPropagation(); toggleDropdown('dd-${i}')&quot;>⋯</button>
        <div class=&quot;dropdown&quot; id=&quot;dd-${i}&quot;>${ddItems}</div>
      </div>
    </div>`;
  }).join('');
}

function filterCards() { renderCards(); }

// ─── Detail ───
function goToList() {
  document.getElementById('page-list').classList.add('active');
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('breadcrumb-current').textContent = '파일첨부 확장자 관리 그룹';
  renderCards();
}

function goDetail(idx) {
  currentGroupIdx = idx;
  const g = groups[idx];
  const isReadonly = currentRole === 'dept' &amp;&amp; g.owner === 'other';

  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('breadcrumb-current').textContent = g.name;

  // Header
  const nameInput = document.getElementById('detailGroupName');
  nameInput.value = g.name;
  nameInput.readOnly = isReadonly;

  document.getElementById('detailDefaultBadge').style.display = g.isDefault ? '' : 'none';
  document.getElementById('detailLockBadge').style.display = isReadonly ? '' : 'none';
  document.getElementById('readonlyBanner').style.display = isReadonly ? 'flex' : 'none';

  // Buttons
  document.getElementById('btnAddExt').style.display = isReadonly ? 'none' : '';
  document.getElementById('btnDelExt').style.display = isReadonly ? 'none' : '';

  // Size select
  document.getElementById('sizeSelect').value = g.sizeLimit;
  document.getElementById('sizeSelect').disabled = isReadonly;

  // Block overlays
  document.getElementById('extBlockOverlay').classList.toggle('show', isReadonly);
  document.getElementById('sizeBlockOverlay').classList.toggle('show', isReadonly);

  renderExts();
}

function renderExts() {
  const g = groups[currentGroupIdx];
  const isReadonly = currentRole === 'dept' &amp;&amp; g.owner === 'other';
  const q = (document.getElementById('extSearch')?.value || '').toLowerCase();
  const filtered = g.exts.filter(e => e.includes(q));

  document.getElementById('extCount').textContent = `총 ${filtered.length}개`;

  if (filtered.length === 0) {
    document.getElementById('extGrid').innerHTML = `<div class=&quot;empty-state&quot; style=&quot;grid-column:1/-1;&quot;>등록된 제어 확장자가 없습니다.</div>`;
    return;
  }

  document.getElementById('extGrid').innerHTML = filtered.map((e, i) =>
    `<div class=&quot;ext-item${isReadonly ? ' readonly' : ''}&quot;>
      <input type=&quot;checkbox&quot; id=&quot;ext-${i}&quot; ${isReadonly ? 'disabled' : ''}>
      <label for=&quot;ext-${i}&quot;>${e}</label>
    </div>`
  ).join('');
}

function filterExts() { renderExts(); }

function saveGroupName() {
  const g = groups[currentGroupIdx];
  const newName = document.getElementById('detailGroupName').value.trim();
  if (newName &amp;&amp; newName !== g.name) {
    g.name = newName;
    showToast('그룹명이 변경되었습니다.');
  }
}

function changeSizeLimit() {
  const g = groups[currentGroupIdx];
  g.sizeLimit = document.getElementById('sizeSelect').value;
  showToast('제어 확장자 리스트에 없는 확장자의 제어 파일 사이즈를 변경하였습니다.');
}

// ─── Group CRUD ───
function createGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { showToast('그룹명을 입력해주세요.'); return; }
  if (groups.some(g => g.name === name)) {
    document.getElementById('createNameError').style.display = 'block';
    return;
  }
  document.getElementById('createNameError').style.display = 'none';
  const withDefault = document.getElementById('toggleDefaultExt').checked;
  const sizeLimit = document.getElementById('createSizeSelect').value;

  groups.push({
    name, isDefault: false,
    owner: currentRole === 'dept' ? 'me' : 'me',
    ownerName: currentRole === 'dept' ? '나(부서관리자)' : '나(전체관리자)',
    sizeLimit,
    exts: withDefault ? [...DEFAULT_EXTS].sort() : [],
    policyCount: 0, modDate: '2026.03.19', policies: []
  });

  closeModal('createGroupModal');
  document.getElementById('newGroupName').value = '';
  renderCards();

  const msg = withDefault
    ? `'${name}' 관리 그룹을 생성하였습니다. (기본 확장자 ${DEFAULT_EXTS.length}개 포함)`
    : `'${name}' 관리 그룹을 생성하였습니다. (빈 그룹)`;
  showToast(msg);
}

function copyGroup(idx) {
  closeAllDropdowns();
  const src = groups[idx];
  let copyName = `${src.name} (복사본)`;
  if (copyName.length > 30) copyName = copyName.substring(0, 27) + '...';

  groups.push({
    name: copyName, isDefault: false,
    owner: 'me',
    ownerName: currentRole === 'dept' ? '나(부서관리자)' : '나(전체관리자)',
    sizeLimit: src.sizeLimit,
    exts: [...src.exts],
    policyCount: 0, modDate: '2026.03.19', policies: []
  });
  renderCards();
  showToast(`'${copyName}' 관리 그룹을 생성하였습니다.`);
}

function tryDeleteGroup(idx) {
  closeAllDropdowns();
  const g = groups[idx];

  if (g.isDefault) {
    document.getElementById('alertTitle').textContent = '삭제 불가';
    document.getElementById('alertMsg').textContent = '대표 관리 그룹을 해제 후 삭제해주세요.';
    openModal('alertModal');
    return;
  }
  if (groups.length <= 1) {
    document.getElementById('alertTitle').textContent = '삭제 불가';
    document.getElementById('alertMsg').textContent = '최소 1개 이상의 그룹이 필요합니다.';
    openModal('alertModal');
    return;
  }

  pendingDeleteIdx = idx;
  let info = `<div class=&quot;label&quot;>선택 그룹</div><div style=&quot;font-size:13px;font-weight:600;margin-bottom:8px;&quot;>${g.name} / 확장자 ${g.exts.length}개</div>`;
  if (g.policyCount > 0) {
    info += `<div class=&quot;label&quot;>적용된 정책 (${g.policyCount})</div><div class=&quot;policy-list&quot;>${g.policies.map(p => `<div class=&quot;policy-item&quot;><span class=&quot;policy-dot&quot; style=&quot;background:#4a7cff;&quot;></span>${p}</div>`).join('')}</div>`;
  }
  document.getElementById('deleteGroupInfo').innerHTML = info;
  openModal('deleteGroupModal');
}

function confirmDeleteGroup() {
  const name = groups[pendingDeleteIdx].name;
  groups.splice(pendingDeleteIdx, 1);
  closeModal('deleteGroupModal');
  renderCards();
  showToast(`'${name}' 관리 그룹을 삭제하였습니다.`);
}

function trySetDefault(idx) {
  pendingDefaultIdx = idx;
  document.getElementById('confirmDefaultText').textContent = `대표 그룹을 '${groups[idx].name}'(으)로 변경하시겠습니까?`;
  openModal('confirmDefaultModal');
}

function confirmSetDefault() {
  groups.forEach(g => g.isDefault = false);
  groups[pendingDefaultIdx].isDefault = true;
  closeModal('confirmDefaultModal');
  renderCards();
  showToast(`대표 그룹을 '${groups[pendingDefaultIdx].name}'(으)로 변경하였습니다.`);
}

// ─── Extension CRUD ───
function addExtensions() {
  const v = document.getElementById('newExtInput').value.trim();
  if (!v) { showToast('확장자를 입력해주세요.'); return; }

  const g = groups[currentGroupIdx];
  const newExts = v.split(',').map(e => e.trim().toLowerCase().replace(/^\./, '')).filter(e => e).slice(0, 10);
  const dups = newExts.filter(e => g.exts.includes(e));

  if (dups.length > 0 &amp;&amp; dups.length === newExts.length) {
    document.getElementById('extDupError').style.display = 'block';
    return;
  }
  document.getElementById('extDupError').style.display = 'none';

  const added = newExts.filter(e => !g.exts.includes(e));
  g.exts = [...g.exts, ...added].sort();
  g.modDate = '2026.03.19';

  closeModal('addExtModal');
  document.getElementById('newExtInput').value = '';
  renderExts();
  showToast(`'${added.join(', ')}' 항목을 파일첨부 제어 확장자로 추가하였습니다.`);
}

function deleteSelectedExts() {
  const checked = document.querySelectorAll('#extGrid input:checked');
  if (!checked.length) { showToast('삭제할 항목을 선택해주세요.'); return; }
  openModal('confirmDeleteExt');
}

function confirmDeleteExts() {
  const g = groups[currentGroupIdx];
  const checked = document.querySelectorAll('#extGrid input:checked');
  const toRemove = [];
  checked.forEach(cb => {
    const label = cb.nextElementSibling;
    if (label) toRemove.push(label.textContent);
  });
  g.exts = g.exts.filter(e => !toRemove.includes(e));
  g.modDate = '2026.03.19';
  closeModal('confirmDeleteExt');
  renderExts();
  showToast(`'${toRemove.join(', ')}' 항목을 파일첨부 제어 확장자에서 삭제하였습니다.`);
}

// ─── Toggle hint ───
function updateToggleHint() {
  const on = document.getElementById('toggleDefaultExt').checked;
  document.getElementById('toggleHint').classList.toggle('hidden', !on);
}

// ─── Util ───
function toggleDropdown(id) { closeAllDropdowns(); document.getElementById(id).classList.toggle('show'); }
function closeAllDropdowns() { document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show')); }
document.addEventListener('click', closeAllDropdowns);

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Init ───
renderCards();
</script>

      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>경로 선택 <span class=&quot;required&quot;>*</span></div><select class=&quot;select-box&quot; id=&quot;pathType&quot; onchange=&quot;onPathTypeChange()&quot;><option value=&quot;direct&quot;>직접 입력</option><optgroup label=&quot;Windows&quot;><option value=&quot;ProgramFiles&quot;>ProgramFiles</option><option value=&quot;IECookies&quot;>IECookies</option><option value=&quot;IECache&quot;>IECache</option><option value=&quot;AppData&quot;>AppData</option><option value=&quot;CommonAppData&quot;>CommonAppData</option><option value=&quot;LocalAppData&quot;>LocalAppData</option><option value=&quot;휴지통&quot;>휴지통</option><option value=&quot;운영체제 시스템 파일&quot;>운영체제 시스템 파일</option><option value=&quot;숨김 파일&quot;>숨김 파일</option></optgroup><optgroup label=&quot;macOS&quot;><option value=&quot;System&quot;>System</option><option value=&quot;Applications&quot;>Applications</option><option value=&quot;Library&quot;>Library</option></optgroup></select></div>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>경로명 <span class=&quot;required&quot;>*</span></div><input class=&quot;form-input&quot; id=&quot;pathName&quot; maxlength=&quot;20&quot; placeholder=&quot;경로명을 입력하세요.&quot;><div class=&quot;form-help&quot;>최대 20자</div></div>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>파일/폴더 경로 <span class=&quot;required&quot;>*</span></div><input class=&quot;form-input&quot; id=&quot;pathValue&quot; placeholder=&quot;경로를 입력하세요.&quot;></div>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>대상 OS <span class=&quot;required&quot;>*</span></div><div class=&quot;checkbox-group&quot;><label><input type=&quot;checkbox&quot; id=&quot;osWin&quot; value=&quot;Windows&quot;> Windows</label><label><input type=&quot;checkbox&quot; id=&quot;osMac&quot; value=&quot;macOS&quot;> macOS</label></div></div>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>사유</div><input class=&quot;form-input&quot; id=&quot;pathReason&quot; placeholder=&quot;예외 사유를 입력해주세요.&quot;></div>
    </div>
    <div class=&quot;modal-footer&quot;><button class=&quot;btn btn-secondary&quot; onclick=&quot;closeModal('addPathModal')&quot;>취소</button><button class=&quot;btn btn-primary&quot; onclick=&quot;addPath()&quot;>추가하기</button></div>
  </div>
</div>

<div class=&quot;modal-overlay&quot; id=&quot;addExtModal&quot;>
  <div class=&quot;modal&quot;>
    <div class=&quot;modal-header&quot;><h3>확장자 예외 추가</h3><button class=&quot;modal-close&quot; onclick=&quot;closeModal('addExtModal')&quot;>×</button></div>
    <div class=&quot;modal-body&quot;>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>확장자 입력 <span class=&quot;required&quot;>*</span></div><input class=&quot;form-input&quot; id=&quot;newExtInput&quot; placeholder=&quot;확장자를 입력하세요. (쉼표로 구분, 최대 10개)&quot;><div class=&quot;form-help&quot;>예: tmp, log, bak</div></div>
      <div class=&quot;form-group&quot;><div class=&quot;form-label&quot;>사유</div><input class=&quot;form-input&quot; id=&quot;extReason&quot; placeholder=&quot;예외 사유를 입력해주세요.&quot;></div>
    </div>
    <div class=&quot;modal-footer&quot;><button class=&quot;btn btn-secondary&quot; onclick=&quot;closeModal('addExtModal')&quot;>취소</button><button class=&quot;btn btn-primary&quot; onclick=&quot;addExts()&quot;>추가하기</button></div>
  </div>
</div>

<div class=&quot;modal-overlay&quot; id=&quot;confirmModal&quot;>
  <div class=&quot;modal&quot; style=&quot;width:420px&quot;>
    <div class=&quot;modal-body&quot; style=&quot;padding:24px&quot;><h4 id=&quot;cfmTitle&quot; style=&quot;font-size:15px;font-weight:700;margin-bottom:10px&quot;></h4><p id=&quot;cfmMsg&quot; style=&quot;font-size:13px;color:#666;line-height:1.6&quot;></p><div id=&quot;cfmInfo&quot; class=&quot;delete-confirm-info&quot; style=&quot;display:none&quot;></div></div>
    <div class=&quot;modal-footer&quot;><button class=&quot;btn btn-secondary&quot; onclick=&quot;closeModal('confirmModal')&quot;>취소</button><button class=&quot;btn btn-primary&quot; id=&quot;cfmBtn&quot; onclick=&quot;&quot;>확인</button></div>
  </div>
</div>

<div class=&quot;modal-overlay&quot; id=&quot;alertModal&quot;>
  <div class=&quot;modal alert-modal&quot;><h4 id=&quot;alertTitle&quot;></h4><p id=&quot;alertMsg&quot;></p><button class=&quot;btn btn-primary&quot; onclick=&quot;closeModal('alertModal')&quot;>확인</button></div>
</div>

<div class=&quot;toast&quot; id=&quot;toast&quot;></div>

<script>
let role='admin', curIdx=null, curTab='path', pendDel=null, pendDef=null;

const SYS_PATHS=[
  {name:'ProgramFiles',path:'ProgramFiles',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'IECookies',path:'IECookies',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'IECache',path:'IECache',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'AppData',path:'AppData',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'CommonAppData',path:'CommonAppData',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'LocalAppData',path:'LocalAppData',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'휴지통',path:'휴지통',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'운영체제 시스템 파일',path:'운영체제 시스템 파일',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'숨김 파일',path:'숨김 파일',os:['Windows'],reason:'시스템',isSystem:true},
  {name:'System',path:'System',os:['macOS'],reason:'시스템',isSystem:true},
  {name:'Applications',path:'Applications',os:['macOS'],reason:'시스템',isSystem:true},
  {name:'Library',path:'Library',os:['macOS'],reason:'시스템',isSystem:true},
];

let groups=[
  {name:'기본 예외',isDefault:true,owner:'me',ownerName:'나(전체관리자)',paths:JSON.parse(JSON.stringify(SYS_PATHS)).concat([{name:'사용자문서',path:'/Users/docs',os:['macOS'],reason:'업무용',isSystem:false}]),exts:[{ext:'tmp',reason:'임시 파일'},{ext:'log',reason:'로그 파일'},{ext:'bak',reason:'백업 파일'}],policyCount:5,modDate:'2026.03.15',policies:['전사 공통 정책','개발팀 정책','디자인팀 정책','외 2개']},
  {name:'개발팀 예외',isDefault:false,owner:'me',ownerName:'나(전체관리자)',paths:JSON.parse(JSON.stringify(SYS_PATHS)).slice(0,6),exts:[{ext:'tmp',reason:'임시'},{ext:'log',reason:'로그'},{ext:'cache',reason:'캐시'}],policyCount:2,modDate:'2026.03.10',policies:['개발1팀 정책','개발2팀 정책']},
  {name:'마케팅팀 예외',isDefault:false,owner:'other',ownerName:'김마케팅(부서관리자)',paths:JSON.parse(JSON.stringify(SYS_PATHS)).slice(0,4),exts:[{ext:'tmp',reason:'임시'}],policyCount:0,modDate:'2026.03.08',policies:[]},
];

function switchRole(r){role=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');if(document.getElementById('pg-detail').classList.contains('active'))goDetail(curIdx);else renderCards()}

function renderCards(){
  const q=(document.getElementById('grpSearch')?.value||'').toLowerCase();
  const f=groups.map((g,i)=>({...g,_i:i})).filter(g=>g.name.toLowerCase().includes(q));
  document.getElementById('grpCount').textContent=`총 ${f.length}개`;
  document.getElementById('cardList').innerHTML=f.map(g=>{
    const i=g._i,ro=role==='dept'&amp;&amp;g.owner==='other';
    let ni='';if(g.isDefault)ni+=`<span class=&quot;badge-default&quot;>대표</span>`;if(ro)ni+=`<span class=&quot;lock-badge&quot;>🔒 읽기 전용</span>`;
    let fc='flag-icon';if(g.isDefault)fc+=' active';if(role==='dept')fc+=' no-interact';
    let fk='';if(role==='admin'&amp;&amp;!g.isDefault)fk=`onclick=&quot;event.stopPropagation();tryDefault(${i})&quot;`;
    let m=[`경로 예외 ${g.paths.length}개`,`확장자 예외 ${g.exts.length}개`];if(ro)m.push(`생성자: ${g.ownerName}`);m.push(`수정 일시 ${g.modDate}`);
    let ph=g.policyCount>0?`<div class=&quot;policy-count&quot;>${g.policyCount}개 정책 적용 중<div class=&quot;tooltip&quot;>${g.policies.join('<br>')}</div></div>`:`<div class=&quot;policy-count&quot; style=&quot;color:#bbb&quot;>0개 정책 적용 중</div>`;
    let dd=`<button class=&quot;dropdown-item&quot; onclick=&quot;event.stopPropagation();copyGroup(${i})&quot;>복사하기</button>`;
    if((role==='admin'||(role==='dept'&amp;&amp;g.owner==='me'))&amp;&amp;!g.isDefault)dd+=`<button class=&quot;dropdown-item danger&quot; onclick=&quot;event.stopPropagation();tryDelGroup(${i})&quot;>삭제하기</button>`;
    return `<div class=&quot;group-card${ro?' readonly':''}&quot; onclick=&quot;goDetail(${i})&quot;><div class=&quot;card-left&quot;><span class=&quot;${fc}&quot; ${fk} title=&quot;${g.isDefault?'대표 그룹':''}&quot;>🚩</span><div class=&quot;card-info&quot;><div class=&quot;card-name-row&quot;><span class=&quot;card-name&quot;>${g.name}</span>${ni}</div><div class=&quot;card-meta&quot;>${m.map(x=>`<span>${x}</span>`).join('<span class=&quot;dot&quot;>·</span>')}</div></div></div><div class=&quot;card-right&quot;>${ph}<button class=&quot;more-btn&quot; onclick=&quot;event.stopPropagation();toggleDD('dd-${i}')&quot;>⋯</button><div class=&quot;dropdown&quot; id=&quot;dd-${i}&quot;>${dd}</div></div></div>`;
  }).join('');
}

function goList(){document.getElementById('pg-list').classList.add('active');document.getElementById('pg-detail').classList.remove('active');document.getElementById('bc').textContent='예외 관리 그룹';renderCards()}

function goDetail(i){
  curIdx=i;const g=groups[i],ro=role==='dept'&amp;&amp;g.owner==='other';
  document.getElementById('pg-list').classList.remove('active');document.getElementById('pg-detail').classList.add('active');
  document.getElementById('bc').textContent=g.name;
  const ni=document.getElementById('detName');ni.value=g.name;ni.readOnly=ro;
  document.getElementById('detDefault').style.display=g.isDefault?'':'none';
  document.getElementById('detLock').style.display=ro?'':'none';
  document.getElementById('roBanner').style.display=ro?'flex':'none';
  document.getElementById('pathBlock').classList.toggle('show',ro);
  document.getElementById('extBlock').classList.toggle('show',ro);
  ['btnAddPath','btnDelPath'].forEach(id=>document.getElementById(id).style.display=ro?'none':'');
  ['btnAddExt','btnDelExt'].forEach(id=>document.getElementById(id).style.display=ro?'none':'');
  switchTab('path');
}

function switchTab(t){
  curTab=t;
  document.getElementById('tabPath').classList.toggle('active',t==='path');
  document.getElementById('tabExt').classList.toggle('active',t==='ext');
  document.getElementById('sec-path').style.display=t==='path'?'':'none';
  document.getElementById('sec-ext').style.display=t==='ext'?'':'none';
  if(t==='path')renderPaths();else renderExts();
}

function renderPaths(){
  const g=groups[curIdx];
  document.getElementById('pathCount').textContent=`총 ${g.paths.length}개`;
  document.getElementById('pathSel').textContent='0개 선택';
  document.getElementById('pathAll').checked=false;
  if(!g.paths.length){document.getElementById('pathBody').innerHTML=`<tr><td colspan=&quot;5&quot; class=&quot;empty-state&quot;>등록된 시스템 경로 예외가 없습니다.</td></tr>`;return;}
  document.getElementById('pathBody').innerHTML=g.paths.map((p,j)=>`<tr><td><input type=&quot;checkbox&quot; class=&quot;pchk&quot; data-i=&quot;${j}&quot; onchange=&quot;updatePathSel()&quot;></td><td class=&quot;link&quot; onclick=&quot;showToast('수정 팝업 (프로토타입에서는 미구현)')&quot;>${p.name}</td><td style=&quot;font-family:monospace;font-size:12px&quot;>${p.path}</td><td>${p.os.map(o=>`<span class=&quot;os-badge&quot;>${o}</span>`).join('')}</td><td style=&quot;color:#888&quot;>${p.reason||'—'}</td></tr>`).join('');
}
function updatePathSel(){document.getElementById('pathSel').textContent=document.querySelectorAll('.pchk:checked').length+'개 선택'}
function toggleAllPath(){const c=document.getElementById('pathAll').checked;document.querySelectorAll('.pchk').forEach(x=>x.checked=c);updatePathSel()}

function renderExts(){
  const g=groups[curIdx];
  document.getElementById('extCount').textContent=`총 ${g.exts.length}개`;
  document.getElementById('extSel').textContent='0개 선택';
  document.getElementById('extAll').checked=false;
  if(!g.exts.length){document.getElementById('extBody').innerHTML=`<tr><td colspan=&quot;3&quot; class=&quot;empty-state&quot;>등록된 확장자 예외가 없습니다.</td></tr>`;return;}
  document.getElementById('extBody').innerHTML=g.exts.map((e,j)=>`<tr><td><input type=&quot;checkbox&quot; class=&quot;echk&quot; data-i=&quot;${j}&quot; onchange=&quot;updateExtSel()&quot;></td><td class=&quot;link&quot; onclick=&quot;showToast('수정 팝업 (프로토타입에서는 미구현)')&quot; style=&quot;font-family:monospace&quot;>${e.ext}</td><td style=&quot;color:#888&quot;>${e.reason||'—'}</td></tr>`).join('');
}
function updateExtSel(){document.getElementById('extSel').textContent=document.querySelectorAll('.echk:checked').length+'개 선택'}
function toggleAllExt(){const c=document.getElementById('extAll').checked;document.querySelectorAll('.echk').forEach(x=>x.checked=c);updateExtSel()}

function saveName(){const g=groups[curIdx],n=document.getElementById('detName').value.trim();if(n&amp;&amp;n!==g.name){g.name=n;showToast('그룹명이 변경되었습니다.')}}

// CRUD
function createGroup(){
  const n=document.getElementById('newGrpName').value.trim();
  if(!n){showToast('그룹명을 입력해주세요.');return}
  if(groups.some(g=>g.name===n)){document.getElementById('createErr').style.display='block';return}
  document.getElementById('createErr').style.display='none';
  const withSys=document.getElementById('toggleSysPath').checked;
  groups.push({name:n,isDefault:false,owner:'me',ownerName:role==='dept'?'나(부서관리자)':'나(전체관리자)',paths:withSys?JSON.parse(JSON.stringify(SYS_PATHS)):[],exts:[],policyCount:0,modDate:'2026.03.19',policies:[]});
  closeModal('createModal');document.getElementById('newGrpName').value='';renderCards();
  showToast(withSys?`'${n}' 관리 그룹을 생성하였습니다. (기본 시스템 예외 경로 포함)`:`'${n}' 관리 그룹을 생성하였습니다. (빈 그룹)`);
}
function copyGroup(i){closeAllDD();const s=groups[i];let cn=`${s.name} (복사본)`;if(cn.length>30)cn=cn.substring(0,27)+'...';groups.push({name:cn,isDefault:false,owner:'me',ownerName:role==='dept'?'나(부서관리자)':'나(전체관리자)',paths:JSON.parse(JSON.stringify(s.paths)),exts:JSON.parse(JSON.stringify(s.exts)),policyCount:0,modDate:'2026.03.19',policies:[]});renderCards();showToast(`'${cn}' 관리 그룹을 생성하였습니다.`)}
function tryDelGroup(i){
  closeAllDD();const g=groups[i];
  if(g.isDefault){showAlert('삭제 불가','대표 관리 그룹을 해제 후 삭제해주세요.');return}
  if(groups.length<=1){showAlert('삭제 불가','최소 1개 이상의 그룹이 필요합니다.');return}
  pendDel=i;let info=`<div class=&quot;label&quot;>선택 그룹</div><div style=&quot;font-size:13px;font-weight:600;margin-bottom:8px&quot;>${g.name} / 예외 항목 ${g.paths.length+g.exts.length}개</div>`;
  if(g.policyCount>0)info+=`<div class=&quot;label&quot;>적용된 정책 (${g.policyCount})</div><div class=&quot;policy-list&quot;>${g.policies.map(p=>`<div class=&quot;policy-item&quot;><span class=&quot;policy-dot&quot; style=&quot;background:#4a7cff&quot;></span>${p}</div>`).join('')}</div>`;
  showConfirm('이 예외 관리 그룹을 삭제하시겠습니까?','삭제 시 적용 중인 정책에서 \'대표 그룹\'으로 자동 변경됩니다.',info,'confirmDelGroup()');
}
function confirmDelGroup(){const n=groups[pendDel].name;groups.splice(pendDel,1);closeModal('confirmModal');renderCards();showToast(`'${n}' 관리 그룹을 삭제하였습니다.`)}
function tryDefault(i){pendDef=i;showConfirm(`대표 그룹을 '${groups[i].name}'(으)로 변경하시겠습니까?`,'그룹이 지정되지 않은 정책 세트에 자동 적용됩니다.',null,'confirmDefault()')}
function confirmDefault(){groups.forEach(g=>g.isDefault=false);groups[pendDef].isDefault=true;closeModal('confirmModal');renderCards();showToast(`대표 그룹을 '${groups[pendDef].name}'(으)로 변경하였습니다.`)}

function onPathTypeChange(){
  const v=document.getElementById('pathType').value;
  const isDirect=v==='direct';
  document.getElementById('pathName').disabled=!isDirect;document.getElementById('pathValue').disabled=!isDirect;
  document.getElementById('osWin').disabled=!isDirect;document.getElementById('osMac').disabled=!isDirect;
  if(!isDirect){
    document.getElementById('pathName').value=v;document.getElementById('pathValue').value=v;
    const macPaths=['System','Applications','Library'];
    document.getElementById('osWin').checked=!macPaths.includes(v);document.getElementById('osMac').checked=macPaths.includes(v);
  } else {document.getElementById('pathName').value='';document.getElementById('pathValue').value='';document.getElementById('osWin').checked=false;document.getElementById('osMac').checked=false;}
}

function addPath(){
  const n=document.getElementById('pathName').value.trim(),p=document.getElementById('pathValue').value.trim();
  if(!n){showToast('경로명을 입력해주세요.');return}if(!p){showToast('경로를 입력해주세요.');return}
  const os=[];if(document.getElementById('osWin').checked)os.push('Windows');if(document.getElementById('osMac').checked)os.push('macOS');
  if(!os.length){showToast('대상 OS를 선택해주세요.');return}
  const g=groups[curIdx];if(g.paths.some(x=>x.path===p)){showToast('이미 등록된 시스템 경로입니다.');return}
  const reason=document.getElementById('pathReason').value.trim();
  g.paths.push({name:n,path:p,os,reason:reason||'',isSystem:document.getElementById('pathType').value!=='direct'});
  g.modDate='2026.03.19';closeModal('addPathModal');resetPathForm();renderPaths();showToast(`'${n}' 시스템 경로 예외를 추가하였습니다.`);
}
function resetPathForm(){['pathName','pathValue','pathReason'].forEach(id=>document.getElementById(id).value='');document.getElementById('pathType').value='direct';document.getElementById('osWin').checked=false;document.getElementById('osMac').checked=false;['pathName','pathValue','osWin','osMac'].forEach(id=>document.getElementById(id).disabled=false)}

function delPaths(){
  const sel=document.querySelectorAll('.pchk:checked');if(!sel.length){showToast('삭제할 항목을 선택해주세요.');return}
  showConfirm(`선택한 ${sel.length}개 시스템 경로 예외를 삭제하시겠습니까?`,'',null,'confirmDelPaths()');
}
function confirmDelPaths(){
  const g=groups[curIdx],idxs=[...document.querySelectorAll('.pchk:checked')].map(c=>+c.dataset.i).sort((a,b)=>b-a);
  idxs.forEach(i=>g.paths.splice(i,1));g.modDate='2026.03.19';closeModal('confirmModal');renderPaths();showToast('선택한 시스템 경로 예외를 삭제하였습니다.');
}

function addExts(){
  const v=document.getElementById('newExtInput').value.trim();if(!v){showToast('확장자명을 입력해주세요.');return}
  const g=groups[curIdx],reason=document.getElementById('extReason').value.trim();
  const newE=v.split(',').map(e=>e.trim().toLowerCase().replace(/^\./,'')).filter(e=>e).slice(0,10);
  const dups=newE.filter(e=>g.exts.some(x=>x.ext===e)),added=newE.filter(e=>!g.exts.some(x=>x.ext===e));
  if(dups.length&amp;&amp;!added.length){showToast('이미 등록된 확장자입니다.');return}
  if(dups.length&amp;&amp;added.length){closeModal('addExtModal');showConfirm('이미 등록된 확장자가 있습니다.','등록된 확장자를 제외하고 등록하시겠습니까?',null,`confirmAddExts('${added.join(',')}','${reason}')`);return}
  added.forEach(e=>g.exts.push({ext:e,reason}));g.modDate='2026.03.19';closeModal('addExtModal');document.getElementById('newExtInput').value='';document.getElementById('extReason').value='';renderExts();showToast(`'${added.join(', ')}' 확장자 예외를 추가하였습니다.`);
}
function confirmAddExts(exts,reason){const g=groups[curIdx];exts.split(',').forEach(e=>g.exts.push({ext:e,reason}));g.modDate='2026.03.19';closeModal('confirmModal');renderExts();showToast(`'${exts}' 확장자 예외를 추가하였습니다.`)}

function delExts(){
  const sel=document.querySelectorAll('.echk:checked');if(!sel.length){showToast('삭제할 항목을 선택해주세요.');return}
  showConfirm(`선택한 ${sel.length}개 확장자 예외를 삭제하시겠습니까?`,'',null,'confirmDelExts()');
}
function confirmDelExts(){
  const g=groups[curIdx],idxs=[...document.querySelectorAll('.echk:checked')].map(c=>+c.dataset.i).sort((a,b)=>b-a);
  idxs.forEach(i=>g.exts.splice(i,1));g.modDate='2026.03.19';closeModal('confirmModal');renderExts();showToast('선택한 확장자 예외를 삭제하였습니다.');
}

// Util
function updateHint(){document.getElementById('sysHint').classList.toggle('hidden',!document.getElementById('toggleSysPath').checked)}
function toggleDD(id){closeAllDD();document.getElementById(id).classList.toggle('show')}
function closeAllDD(){document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('show'))}
document.addEventListener('click',closeAllDD);
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function showAlert(t,m){document.getElementById('alertTitle').textContent=t;document.getElementById('alertMsg').textContent=m;openModal('alertModal')}
function showConfirm(t,m,info,fn){document.getElementById('cfmTitle').textContent=t;document.getElementById('cfmMsg').textContent=m;const inf=document.getElementById('cfmInfo');if(info){inf.innerHTML=info;inf.style.display='block'}else{inf.style.display='none'}document.getElementById('cfmBtn').setAttribute('onclick',fn+';');openModal('confirmModal')}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
renderCards();
